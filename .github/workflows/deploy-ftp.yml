name: Déploiement FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build et déploiement FTP
    runs-on: ubuntu-latest
    environment: prod
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Vérification des secrets Supabase
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ]; then
            echo "⚠️  ATTENTION: Le secret VITE_SUPABASE_URL n'est pas configuré"
            echo "📝 Le build continuera mais Supabase ne fonctionnera pas en production"
            echo "🔧 Pour configurer: Settings > Secrets and variables > Actions > New repository secret"
          else
            echo "✅ VITE_SUPABASE_URL est configuré"
          fi
          if [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "⚠️  ATTENTION: Le secret VITE_SUPABASE_ANON_KEY n'est pas configuré"
            echo "📝 Le build continuera mais Supabase ne fonctionnera pas en production"
            echo "🔧 Pour configurer: Settings > Secrets and variables > Actions > New repository secret"
          else
            echo "✅ VITE_SUPABASE_ANON_KEY est configuré"
          fi
          if [ -n "${{ secrets.VITE_SUPABASE_URL }}" ] && [ -n "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "✅ Tous les secrets Supabase sont configurés - Supabase fonctionnera correctement"
          fi

      - name: Build du projet
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || '' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}
        run: npm run build

      - name: Vérification des secrets FTP
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "❌ Erreur: Le secret FTP_SERVER n'est pas configuré"
            echo "📝 Veuillez configurer les secrets dans GitHub:"
            echo "   Settings > Secrets and variables > Actions"
            echo "   - FTP_SERVER (ex: ftp.example.com)"
            echo "   - FTP_USERNAME (votre nom d'utilisateur)"
            echo "   - FTP_PASSWORD (votre mot de passe)"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME }}" ]; then
            echo "❌ Erreur: Le secret FTP_USERNAME n'est pas configuré"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "❌ Erreur: Le secret FTP_PASSWORD n'est pas configuré"
            exit 1
          fi
          echo "✅ Tous les secrets FTP sont configurés"

      - name: Déploiement via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir: ./dist/
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
          dangerous-clean-slate: false
          log-level: verbose
          state-name: ftp-deploy-state
          dry-run: false

